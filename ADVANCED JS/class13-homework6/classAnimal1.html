<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Animal Form</title>
  </head>

  <body>
    <h2>Add Animal</h2>

    <form id="animalForm">
      <table border="1">
        <tr>
          <td>Name</td>
          <td>
            <input type="text" id="name" placeholder="Enter animal name" />
          </td>
        </tr>

        <tr>
          <td>Type</td>
          <td>
            <select id="type">
              <option value="">Select type</option>
              <option value="carnivore">Carnivore</option>
              <option value="herbivore">Herbivore</option>
              <option value="omnivore">Omnivore</option>
            </select>
          </td>
        </tr>

        <tr>
          <td>Age</td>
          <td>
            <input type="number" id="age" placeholder="Enter age" />
          </td>
        </tr>

        <tr>
          <td>Size</td>
          <td>
            <input type="number" id="size" placeholder="Enter size" />
          </td>
        </tr>
      </table>

      <br />

      <button type="submit">Create Animal</button>
    </form>

    <br><br>

    <h2>Animals List</h2>

    <table id="animalsTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Age</th>
          <th>Size</th>
          <th>Is Eaten</th>
        </tr>
      </thead>

      <tbody></tbody>
    </table>

    <br><br>
    <h2>Animal Eating</h2>

    <select id="animal1"></select>

    <select id="animal2"></select>
    <br>
    <button id="eatBtn">Eat</button>

    <br /><br />
    <h3>Result</h3>
    <div id="result"></div>

    <script src="classAnimal1.js"></script>

    <link rel="stylesheet" href="style.css" />
  </body>
</html>
